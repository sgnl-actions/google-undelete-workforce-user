# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: google-undelete-workforce-user
description: Undelete a workforce user from Google Cloud IAM Workforce Identity

# Input parameters for web form generation
inputs:
  subjectId:
    type: text
    description: The subject ID of the workforce user to undelete
    required: true
    validation:
      min: 1
      max: 200

  workforcePoolId:
    type: text
    description: The ID of the workforce pool containing the user
    required: true
    validation:
      min: 1
      max: 100

  address:
    type: text
    description: Google IAM API base URL (defaults to https://iam.googleapis.com if not provided)
    required: false
    validation:
      min: 1
      max: 500

# Expected output structure
outputs:
  workforcePoolId:
    type: text
    description: The workforce pool ID that was processed

  subjectId:
    type: text
    description: The subject ID that was undeleted

  undeleted:
    type: boolean
    description: Whether the user was successfully undeleted

  alreadyActive:
    type: boolean
    description: Whether the user was already active (not deleted)

  undeletedAt:
    type: datetime
    description: When the undeletion completed (ISO 8601)

# Required secrets (configured at deployment time)
# The configured auth type will determine which secrets are available
secrets:
  BEARER_AUTH_TOKEN:
    type: text
    description: Bearer auth token
    required: false
  BASIC_USERNAME:
    type: text
    description: Basic auth username
    required: false
  BASIC_PASSWORD:
    type: text
    description: Basic auth password
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET:
    type: text
    description: OAuth2 client secret
    required: false
  OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN:
    type: text
    description: OAuth2 authorization code access token
    required: false

environment:
  ADDRESS:
    type: text
    description: Google IAM API base URL
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUDIENCE:
    type: text
    description: OAuth2 client credentials audience
    required: false
  OAUTH2_CLIENT_CREDENTIALS_AUTH_STYLE:
    type: text
    description: OAuth2 client credentials auth style
    required: false
  OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID:
    type: text
    description: OAuth2 client credentials client ID
    required: false
  OAUTH2_CLIENT_CREDENTIALS_SCOPE:
    type: text
    description: OAuth2 client credentials scope
    required: false
  OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL:
    type: text
    description: OAuth2 client credentials token URL
    required: false

optional_one_of:
  - ["secrets.BEARER_AUTH_TOKEN"]
  - ["secrets.BASIC_USERNAME", "secrets.BASIC_PASSWORD"]
  - [
      "secrets.OAUTH2_CLIENT_CREDENTIALS_CLIENT_SECRET",
      "environment.OAUTH2_CLIENT_CREDENTIALS_CLIENT_ID",
      "environment.OAUTH2_CLIENT_CREDENTIALS_TOKEN_URL",
    ]
  - ["secrets.OAUTH2_AUTHORIZATION_CODE_ACCESS_TOKEN"]

# Runtime configuration
runtime:
  type: nodejs-22
  timeout: 30s
  memory: 128Mi
